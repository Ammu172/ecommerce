<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store | Shop Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h1>🛍️ E-Store</h1>
        <div class="nav-links">
            <button onclick="showProducts()">Products</button>
            <button onclick="showOrders()">My Orders</button>
            <button onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</button>
            <button id="auth-btn" onclick="showAuth()">Login/Register</button>
            <button id="logout-btn" onclick="logout()" style="display:none;">Logout</button>
        </div>
    </div>
    
    <div id="app" class="container"></div>
    
    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cart-sidebar">
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
        <div class="cart-total">Total: ₹<span id="cart-total">0</span></div>
        <button onclick="openCheckoutModal()" class="checkout-btn">Proceed to Checkout</button>
        <button onclick="toggleCart()" class="close-btn">Close</button>
    </div>
    
    <!-- Checkout Modal -->
    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <h2>Checkout</h2>
            <div class="address-field">
                <label>Shipping Address:</label>
                <textarea id="shipping-address" rows="3" placeholder="Enter your complete address..."></textarea>
            </div>
            <h3>Select Payment Method:</h3>
            <div id="payment-options">
                <div class="payment-option" onclick="selectPayment('credit_card')">💳 Credit Card</div>
                <div class="payment-option" onclick="selectPayment('debit_card')">💳 Debit Card</div>
                <div class="payment-option" onclick="selectPayment('upi')">📱 UPI</div>
                <div class="payment-option" onclick="selectPayment('cod')">💵 Cash on Delivery</div>
            </div>
            <div id="payment-details" style="display:none;">
                <div class="payment-details" id="payment-form"></div>
            </div>
            <div class="modal-buttons">
                <button class="confirm-btn" onclick="placeOrder()">Place Order</button>
                <button class="cancel-btn" onclick="closeCheckoutModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <div id="message" class="message"></div>
    
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
